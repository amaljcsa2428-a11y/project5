<div class="container text-center">
  <div class="row">
    <div class="col">
      <section class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card shadow">
                <div class="card-body p-4">

                    <h2 class="text-center mb-4">Contact Us</h2>
                    <p class="text-center text-muted mb-4">
                        Have a question about an order, product, or return? We'd love to help.
                    </p>

                    <form>

                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" placeholder="Enter your name">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" placeholder="Enter your email">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Phone Number</label>
                            <input type="tel" class="form-control" placeholder="Enter your phone number">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Subject</label>
                            <select class="form-select">
                                <option selected>Select a topic</option>
                                <option>Order Status</option>
                                <option>Returns & Refunds</option>
                                <option>Product Inquiry</option>
                                <option>Payment Issue</option>
                                <option>Technical Support</option>
                                <option>Other</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Order Number (Optional)</label>
                            <input type="text" class="form-control" placeholder="e.g. ORD123456">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Message</label>
                            <textarea class="form-control" rows="5" placeholder="Describe your issue or question"></textarea>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">
                                Send Message
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</section>
    </div>
    <div class="col">
      <section class="container my-5">
    <h2 class="text-center mb-4">Our Location</h2>

    <div class="ratio ratio-16x9">
        <iframe
            src="https://maps.google.com/maps?q=Alappuzha,Kerala&t=&z=13&ie=UTF8&iwloc=&output=embed"
            allowfullscreen=""
            loading="lazy">
        </iframe>
    </div>
</section>
    </div>
  </div>
</div>
